name: Feature request
description: New field type, new protocol support, changes to the GameDefinition shape, etc.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you add or change? Include a rough TypeScript sketch if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This is a breaking change to existing GameDefinition fields
        - label: This requires changes to query.ts
        - label: This affects how the consuming platform (perk-agent / API) must behave
